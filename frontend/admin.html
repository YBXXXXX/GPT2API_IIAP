<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT2API_IIAP - 管理面板</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #888;
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ccc;
        }
        input[type="password"],
        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }
        input:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .btn {
            padding: 14px 32px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #2a2a2a;
            color: #ccc;
            border: 1px solid #333;
        }
        .btn-secondary:hover {
            background: #333;
        }
        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            font-size: 0.9rem;
        }
        .account-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        .account-table th,
        .account-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #2a2a2a;
            font-size: 0.9rem;
        }
        .account-table th {
            color: #888;
            font-weight: 500;
        }
        .account-table tr:hover td {
            background: rgba(102, 126, 234, 0.05);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        .status-active {
            background: rgba(34, 197, 94, 0.1);
            color: #22c55e;
        }
        .status-limited {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
        }
        .status-invalid {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        .nav {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .nav a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav a:hover {
            color: #e0e0e0;
            background: #1a1a1a;
        }
        .nav a.active {
            color: #667eea;
            background: rgba(102, 126, 234, 0.1);
        }
        .section {
            display: none;
        }
        .section.active {
            display: block;
        }
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .actions .btn {
            padding: 8px 16px;
            font-size: 0.85rem;
        }
        .token-mask {
            font-family: monospace;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="/ui/admin.js"></script>
</body>
</html>
